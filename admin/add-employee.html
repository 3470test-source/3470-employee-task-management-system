  <div class="add-employee-card-admin">
  <h2>Add Employee</h2>

  <form id="addEmployeeForm" enctype="multipart/form-data">
    <div class="add-employee-box">

      <div class="add-employee-form-group">
        <label>Department Name:</label>
        <select id="empDept" required>
          <option value="">Select Department</option>
        </select>
      </div>

      <div class="add-employee-form-group">
        <label>Employee ID:</label>
        <input type="text" id="empId" required>
      </div>

      <div class="add-employee-form-group">
        <label>Employee Name:</label>
        <input type="text" id="empName" required>
      </div>

      <div class="add-employee-form-group">
        <label>Email:</label>
        <input type="email" id="empEmail" required>
      </div>

      <div class="add-employee-form-group">
        <label>Contact Number:</label>
        <input type="tel" id="empPhone" required>
      </div>

      <div class="add-employee-form-group">
        <label>Designation:</label>
        <input type="text" id="empDesignation" required>
      </div>

      <div class="add-employee-form-group">
        <label>Date of Birth:</label>
        <input type="date" id="empDOB" required>
      </div>

      <div class="add-employee-form-group">
        <label>Address:</label>
        <textarea id="empAddress" rows="3" required></textarea>
      </div>

      <div class="add-employee-form-group">
        <label>Date of Joining:</label>
        <input type="date" id="empDOJ" required>
      </div>

      <div class="add-employee-form-group">
        <label>Description:</label>
        <textarea id="empDesc" rows="2"></textarea>
      </div>

      <div class="add-employee-form-group">
        <label>Password:</label>
        <input type="password" id="empPassword" required>
      </div>

      <div class="add-employee-form-group">
        <label>Employee Photo:</label>
        <input type="file" id="empPhoto" accept="image/*">
      </div>

      <button type="submit" class="add-employee-btn-add">
        Add Employee
      </button>

    </div>
  </form>

<!-- drop down filed JS -->
<script>
  const dropBtns = document.querySelectorAll(".admin-side-bar-drop-btn");

  dropBtns.forEach(btn => {
    btn.addEventListener("click", function () {

      const dropdown = this.parentElement;

      // Close other dropdowns (optional but better UX)
      document.querySelectorAll(".admin-sidebar-task-dropdown").forEach(item => {
        if (item !== dropdown) {
          item.classList.remove("active");
        }
      });

      // Toggle current dropdown
      dropdown.classList.toggle("active");
    });
  });
</script>

<!-- profile dropdown field JS -->
<script>
function toggleDropdown() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

// optional: close when click outside
document.addEventListener("click", function(event) {
  let dropdown = document.querySelector(".admin-profile-dropdown");
  if (!dropdown.contains(event.target)) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
});
</script>















<script>
    let departments = [
  { id: 1, name: "HR" },
  { id: 2, name: "Technical" },
  { id: 3, name: "Accounts" }
];

let employees = [];

// Load departments dropdown
function loadDepartments() {
  const select = document.getElementById("empDept");

  departments.forEach(dept => {
    const option = document.createElement("option");
    option.value = dept.id;
    option.textContent = dept.name;
    select.appendChild(option);
  });
}
loadDepartments();


// Add Employee
document.getElementById("addEmployeeForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const employee = {
    deptId: document.getElementById("empDept").value,
    empId: document.getElementById("empId").value,
    name: document.getElementById("empName").value,
    email: document.getElementById("empEmail").value,
    phone: document.getElementById("empPhone").value,
    designation: document.getElementById("empDesignation").value,
    dob: document.getElementById("empDOB").value,
    address: document.getElementById("empAddress").value,
    doj: document.getElementById("empDOJ").value,
    description: document.getElementById("empDesc").value,
    password: document.getElementById("empPassword").value,
    photo: document.getElementById("empPhoto").files[0]?.name || ""
  };

  // Basic validation
  if (!employee.deptId || !employee.empId || !employee.name || !employee.email) {
    alert("Please fill all required fields");
    return;
  }

  employees.push(employee);

  console.log("Employee Added:", employee);

  alert("Employee added successfully!");

  document.getElementById("addEmployeeForm").reset();
});
</script>
