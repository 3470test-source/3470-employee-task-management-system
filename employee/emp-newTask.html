  <!-- CENTER TITLE -->

  <!-- RIGHT -->

  <!-- Notification Icon -->

  <!-- Profile Section -->

</div>

</div>

</header>

<!-- Dashboard Side Bar -->
<div class="employee-side-bar-container">

  <!-- SIDEBAR -->

<!-- Employee View New Task -->
<div class="emp-new-task-container">

    <h2>View New Task</h2>

      <table class="emp-new-task-table">

        <thead>
            <tr>
              <th>S.No</th>
              <th>Task Title</th>
              <th>Department</th>
              <th>Assign To</th>
              <th>Assign Date</th>
              <th>End Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
        </thead>

       <tbody id="newTaskBody"></tbody>

      </table>

</div>
 
<!-- drop down filed JS -->
<script>
  const dropBtn = document.querySelector(".emp-side-bar-drop-btn");
  const dropdown = document.querySelector(".employee-sidebar-task-dropdown");

  dropBtn.addEventListener("click", () => {
    dropdown.classList.toggle("active");
  });
</script>


<!-- profile dropdown field JS -->
<script>
function toggleDropdown() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

// optional: close when click outside
document.addEventListener("click", function(event) {
  let dropdown = document.querySelector(".admin-profile-dropdown");
  if (!dropdown.contains(event.target)) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
});
</script>

























<script>
const tasks = [
{
 title:"Change in XYZ Software",
 department:"Technical",
 assignedTo:"John Doe",
 assignDate:"2024-09-20",
 endDate:"2024-09-25",
 status:"Completed"
}
];

function loadNewTasks(){

    const tbody = document.getElementById("newTaskBody");
    tbody.innerHTML = "";

    const newTasks = tasks.filter(task =>
        task.status === "New" ||
        task.status === "Not Updated Yet"
    );

    if(newTasks.length === 0){

        tbody.innerHTML = `
        <tr>
            <td colspan="8" class="emp-newtask-no-record">
                No Record found
            </td>
        </tr>
        `;

        return;
    }

    newTasks.forEach((task,index)=>{

        tbody.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${task.title}</td>
            <td>${task.department}</td>
            <td>${task.assignedTo}</td>
            <td>${task.assignDate}</td>
            <td>${task.endDate}</td>

            <td>
                <span class="emp-newTask-badge">
                    ${task.status}
                </span>
            </td>

            <td>
                <button onclick="viewTask(${index})">
                    View
                </button>
            </td>
        </tr>
        `;
    });

}

function viewTask(index){
   alert("View Task");
}

loadNewTasks();
</script>

</body>
</html>
