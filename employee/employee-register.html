<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3470 Healthcare & Employee Task Management-System - Employee Register</title>

    <!-- Favicon -->
    <link rel="icon" href="/image/Logo3470-health3-removebg-preview.png" type="image/x-icon">

    <!-- Css styles -->
    <link rel="stylesheet" href="/css/styles.css" />

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #067685, #03521d);
    }

    </style>

</head>
<body>
    
<div class="employee-task-register-form">

  <!-- LEFT SIDE -->
  <div class="employee-task-left-register">
    <img src="/image/Logo3470-health3-removebg-preview.png">
    <h1>Employee Task Management System</h1>
    <p>Streamline tasks and improve productivity efficiently</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="employee-task-right-register">

    <!-- HEADER -->
    <h2>Employee Register</h2>
    <p>Create your account in a few easy steps</p>

    <form id="employee-register-task" class="employee-register-task-page">

      <input type="text" id="empId" placeholder="Employee ID" required>
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="phone" placeholder="Phone Number" required>
      
      <!-- PASSWORD FIELD -->
      <div class="employee-register-password-wrapper">
        <input type="password" id="password" placeholder="Password" required>
        <span class="Emp-reg-toggle-password" onclick="togglePassword()"><i id="eyeIcon" class="fa-solid fa-eye"></i></span>
      </div>

      <button type="submit">Register</button>

      <!-- LOGIN LINK (UPDATED) -->
      <p class="employee-login-link">
        Already have an account?<a href="/frontend/employee-login.html"> Login</a>
      </p>

    </form>

  </div>

</div>

<!-- Java script  -- Password method Icon -->
<script>
function togglePassword() {
  const password = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");

  if (password.type === "password") {
    password.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    password.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>

</body>
</html>
