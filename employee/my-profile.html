<!-- Dashboard Side Bar -->

<!-- Employee Side - My Profile -->

<!-- Profile - DETAILS -->

    </div>

    </div>

<!-- ================= EDIT FORM ================= -->

    <div class="edit-profile-form" id="editProfileForm">

                </div>

<!-- drop down filed JS -->
<script>
  const dropBtn = document.querySelector(".emp-side-bar-drop-btn");
  const dropdown = document.querySelector(".employee-sidebar-task-dropdown");

  dropBtn.addEventListener("click", () => {
    dropdown.classList.toggle("active");
  });
</script>



<!-- profile dropdown field JS -->
<script>
function toggleDropdown() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

// optional: close when click outside
document.addEventListener("click", function(event) {
  let dropdown = document.querySelector(".admin-profile-dropdown");
  if (!dropdown.contains(event.target)) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
});
</script>



<!-- Employee dashboard Emp Name & Emp ID -->
<script>
const employee = JSON.parse(localStorage.getItem("employee"));

// ================= CHECK LOGIN =================

if (!employee) {

    window.location.href =
    "/employee/employee-login.html";
}

// ================= SHOW NAME =================

document.getElementById("empName")
.innerText = employee.name;

// ================= SHOW EMPLOYEE ID =================

document.getElementById("empId")
.innerText = employee.emp_id;

</script>



<!-- Notification - JS -->
<script>

// ================= LOAD NOTIFICATION COUNT =================

async function loadNotificationCount(){

  try{

    const res = await fetch(
      `http://localhost:3000/notification-count/${employee.id}`
    );

    const data = await res.json();

    document.getElementById("notificationCount")
    .innerText = data.total;

  }

  catch(error){
    console.log(error);
  }

}

// ================= TOGGLE NOTIFICATIONS =================

async function toggleNotifications(event){

  event.stopPropagation();

  const box = document.getElementById("notificationBox");

// TOGGLE

  if(box.style.display === "block"){

    box.style.display = "none";

    return;

  }

  try{

    const res = await fetch(
      `http://localhost:3000/employee-notifications/${employee.id}`
    );

    const notifications = await res.json();

    const list = document.getElementById("notificationList");

    list.innerHTML = "";

    // NO DATA

    if(notifications.length === 0){

      list.innerHTML =`
          <div class="no-notification">
            No Notifications Found
          </div>
          `
    }

    else{

      notifications.forEach(notification => {

        list.innerHTML += `
          <div class="notification-item">
            <p class="notification-message">
              <span class="notification-tag"> NEW TASK ASSIGNED </span>
              
              <span class="notification-title">
                ${notification.message.replace("New Task Assigned: ", "")}
              </span>
            </p>

            <small>
              ${
                new Date(notification.created_at)
                .toLocaleString()
              }
            </small>

          </div>
        `;
      });

    }

    // SHOW POPUP

    box.style.display = "block";

    // MARK AS READ

    await fetch(
      `http://localhost:3000/mark-notifications-read/${employee.id}`,
      {
        method:"PUT"
      }
    );

    // RELOAD COUNT

    loadNotificationCount();

  }

  catch(error){

    console.log(error);

  }

}

// ================= CLOSE POPUP =================

document.addEventListener("click", function(e){

  const box =
    document.getElementById("notificationBox");

  const bell =
    document.querySelector(".emp-da-icon-notification");

  if(
    !box.contains(e.target)
    &&
    !bell.contains(e.target)
  ){

    box.style.display = "none";

  }

});

// ================= INITIAL LOAD =================

loadNotificationCount();

</script>



<!-- Employee Side -- My Profile -->

<script>

// ================= GET EMPLOYEE =================

// LOGIN CHECK

if(!employee){

  window.location.href = "/employee/employee-login.html";
}

// ================= LOAD PROFILE =================

async function loadProfile(){

  try{

    const res = await fetch(
      `http://localhost:3000/employees/${employee.id}`
    );

    const emp = await res.json();

  // PROFILE PHOTO

    if(emp.photo){

      document.getElementById("profilePhoto")
      .src = `http://localhost:3000/uploads/${emp.photo}`;

    }

  // PROFILE DATA

    document.getElementById("profileName")
    .innerText = emp.name;

    document.getElementById("profileEmpId")
    .innerText = emp.emp_id;

    document.getElementById("profileDesignation")
    .innerText = emp.designation;

    document.getElementById("profileEmail")
    .innerText = emp.email;

    document.getElementById("profilePhone")
    .innerText = emp.phone;

    document.getElementById("profileDepartment")
    .innerText = emp.department || "-";

    document.getElementById("profileDob")
    .innerText =
      new Date(emp.dob).toLocaleDateString();

    document.getElementById("profileDoj")
    .innerText =
      new Date(emp.doj).toLocaleDateString();

    document.getElementById("profileAddress")
    .innerText = emp.address;

    document.getElementById("profileDescription")
    .innerText = emp.description;



// ================= EDIT FORM VALUES =================

    document.getElementById("editEmpId")
    .value = emp.emp_id || "";

    document.getElementById("editDepartment")
    .value = emp.department || "";

    document.getElementById("editDesignation")
    .value = emp.designation || "";

    document.getElementById("editName")
    .value = emp.name || "";

    document.getElementById("editEmail")
    .value = emp.email || "";

    document.getElementById("editPhone")
    .value = emp.phone || "";

    document.getElementById("editDob")
    .value = emp.dob
      ? emp.dob.split("T")[0]
      : "";

    document.getElementById("editDoj")
    .value = emp.doj
      ? emp.doj.split("T")[0]
      : "";

    document.getElementById("editAddress")
    .value = emp.address || "";

    document.getElementById("editDescription")
    .value = emp.description || "";

  }

  catch(error){

    console.log(error);

    alert("Failed to load profile");

  }

}

loadProfile();


// ================= OPEN EDIT FORM =================

function openEditForm(){

  const form =
  document.getElementById("editProfileForm");

  if(form.style.display === "block"){

    form.style.display = "none";

  }

  else{

    form.style.display = "block";

  }

}


// ================= CLOSE EDIT FORM =================

function closeEditForm(){

  document.getElementById("editProfileForm")
  .style.display = "none";

}



// ================= UPDATE PROFILE =================

document.getElementById("updateProfileForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  // FORM DATA

  const formData = new FormData();

  formData.append(
    "name",
    document.getElementById("editName").value
  );

  formData.append(
    "email",
    document.getElementById("editEmail").value
  );

  formData.append(
    "phone",
    document.getElementById("editPhone").value
  );

  formData.append(
    "dob",
    document.getElementById("editDob").value
  );

  formData.append(
    "doj",
    document.getElementById("editDoj").value
  );

  formData.append(
    "address",
    document.getElementById("editAddress").value
  );

  formData.append(
    "description",
    document.getElementById("editDescription").value
  );

  // PHOTO

  const photo =
    document.getElementById("editPhoto").files[0];

  if(photo){

    formData.append("photo", photo);

  }

  try{

    const res = await fetch(
      `http://localhost:3000/employees/${employee.id}`,
      {
        method:"PUT",
        body:formData
      }
    );

    const data = await res.json();

    alert(data.message);

    // RELOAD PROFILE

    loadProfile();

    // CLOSE FORM

    closeEditForm();

  }

  catch(error){

    console.log(error);

    alert("Profile update failed");

  }

});

</script>


</body>
</html>
