<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3470 Healthcare & Employee Task Management-System - Employee - Change Password</title>

    <!-- Favicon -->
    <link rel="icon" href="/image/Logo3470-health3-removebg-preview.png" type="image/x-icon">

    <!-- Css styles -->
    <link rel="stylesheet" href="/css/styles.css" />

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #dddfe7;
    }

  /*--- PASSWORD FIELD ---*/

    .password-field {
      position: relative;
      margin-bottom: 15px;
    }

    .password-field input {
      width: 100%;
      padding: 12px 45px 12px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

  /*--- EYE ICON ---*/

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #666;
      font-size: 12px;
    }

    .toggle-password:hover {
      color: #2d6cdf;
    }

    </style>

</head>
<body>

<!-- Employee dashbaord HEADER -->
<header class="employee-dashboard-header">

  <!-- LEFT: logo + menu -->
  <div class="left-header-emp">

    <div class="logo-header-emp">
      <img src="/image/Logo3470-health3-removebg-preview (1).png" alt="ETMS Logo">
    </div>

    <div class="left-header-emp-menu-btn">
      <i class="fa fa-bars"></i>
    </div>

  </div>

  <!-- CENTER TITLE -->
  <div class="header-emp-dash-center">
    EMPLOYEE TASK MANAGEMENT SYSTEM
  </div>

  <!-- RIGHT -->
  <div class="right-header-emp">

  <!-- Notification Icon -->
  <div class="emp-da-icon-notification" onclick="toggleNotifications(event)">
    <i class="fa fa-bell"></i>
      <span id="notificationCount" class="notification-count">0</span>
  </div>

  <!-- Notification Popup -->
  <div id="notificationBox" class="notification-box">
    <h3><i class="fa fa-bell"></i>Notifications</h3>
      <div id="notificationList"></div>
  </div>

  <!-- Profile Section -->
  <div class="admin-profile-dropdown">

  <!-- Click Button -->
  <div class="admin-profile-btn right-header-emp-profile" onclick="toggleDropdown()">
    <div class="right-header-avatar-icon">
      <i class="fa fa-user"></i>
    </div>
    <div>
      <h4 id="empName"></h4>
      <small id="empId"></small>
    </div>
  </div>

  <!-- Dropdown -->
  <div class="emp-dropdown-menu" id="dropdownMenu">
    <a href="/employee/my-profile.html"><i class="fa fa-user"></i> My Profile</a>
    <a href="/employee/change-password.html"><i class="fa-solid fa-key"></i> Change Password</a>
    <a href="/employee/employee-login.html"><i class="fa fa-sign-out"></i> Logout</a>
  </div>
</div>

</div>

</header>

<!-- Dashboard Side Bar -->
<div class="employee-side-bar-container">

  <!-- SIDEBAR -->
  <aside class="employee-dsh-sidebar">

    <a href="/employee/employee-dashboard.html"><i class="fa fa-dashboard"></i> Dashboard</a>

    <!-- TASK DROPDOWN -->
    <div class="employee-sidebar-task-dropdown">

      <div class="emp-side-bar-drop-btn">
        <i class="fa fa-briefcase"></i> Task
        <i class="fa fa-angle-down"></i>
      </div>

      <div class="emp-side-bar-drop-content">
        <a href="/employee/emp-newTask.html"><i class="fa fa-plus-circle"></i> New Task</a>
        <a href="/employee/emp-inprogressTask.html"><i class="fa fa-spinner"></i> Inprogress Task</a>
        <a href="/employee/emp-completedTask.html"><i class="fa fa-check-circle"></i> Completed Task</a>
        <a href="/employee/emp-allTask.html"><i class="fa fa-list"></i> All Task</a>
      </div>

    </div>

  </aside>

<!-- Employee - Change Password -->
<div class="emp-change-password-box">

      <h2>Change Password</h2>

        <form id="changePasswordForm">

          <!-- CURRENT PASSWORD -->
          <label>Current Password</label>
            <div class="password-field">
              <input type="password" id="currentPassword" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('currentPassword', this)"></i>
            </div>

          <!-- NEW PASSWORD -->
          <label>New Password</label>
            <div class="password-field">
              <input type="password" id="newPassword" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('newPassword', this)"></i>
            </div>

          <!-- CONFIRM PASSWORD -->
          <label>Confirm Password</label>
            <div class="password-field">
              <input type="password" id="confirmPassword" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
            </div>

          <button type="submit">Update</button>

          <p id="msg"></p>

        </form>
</div>

<!-- drop down filed JS -->
<script>
  const dropBtn = document.querySelector(".emp-side-bar-drop-btn");
  const dropdown = document.querySelector(".employee-sidebar-task-dropdown");

  dropBtn.addEventListener("click", () => {
    dropdown.classList.toggle("active");
  });
</script>


<!-- profile dropdown field JS -->
<script>
function toggleDropdown() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

// optional: close when click outside
document.addEventListener("click", function(event) {
  let dropdown = document.querySelector(".admin-profile-dropdown");
  if (!dropdown.contains(event.target)) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
});
</script>



<!-- Employee dashboard Emp Name & Emp ID -->
<script>
const employee = JSON.parse(localStorage.getItem("employee"));

// ================= CHECK LOGIN =================

if (!employee) {

    window.location.href =
    "/employee/employee-login.html";
}

// ================= SHOW NAME =================

document.getElementById("empName")
.innerText = employee.name;

// ================= SHOW EMPLOYEE ID =================

document.getElementById("empId")
.innerText = employee.emp_id;

</script>



<!-- Password open  / Close hide  - JS -->
<script>
function togglePassword(inputId, icon) {

  const input = document.getElementById(inputId);

// SHOW PASSWORD

  if (input.type === "password") {

    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");

  }

// HIDE PASSWORD

  else {

    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");

  }

}
</script>



<!-- Notification - JS -->
<script>

// ================= LOAD NOTIFICATION COUNT =================

async function loadNotificationCount(){

  try{

    const res = await fetch(
      `http://localhost:3000/notification-count/${employee.id}`
    );

    const data = await res.json();

    document.getElementById("notificationCount")
    .innerText = data.total;

  }

  catch(error){
    console.log(error);
  }

}

// ================= TOGGLE NOTIFICATIONS =================

async function toggleNotifications(event){

  event.stopPropagation();

  const box = document.getElementById("notificationBox");

// TOGGLE

  if(box.style.display === "block"){

    box.style.display = "none";

    return;

  }

  try{

    const res = await fetch(
      `http://localhost:3000/employee-notifications/${employee.id}`
    );

    const notifications = await res.json();

    const list = document.getElementById("notificationList");

    list.innerHTML = "";

    // NO DATA

    if(notifications.length === 0){

      list.innerHTML =`
          <div class="no-notification">
            No Notifications Found
          </div>
          `
    }

    else{

      notifications.forEach(notification => {

        list.innerHTML += `
          <div class="notification-item">
            <p class="notification-message">
              <span class="notification-tag"> NEW TASK ASSIGNED </span>
              
              <span class="notification-title">
                ${notification.message.replace("New Task Assigned: ", "")}
              </span>
            </p>

            <small>
              ${
                new Date(notification.created_at)
                .toLocaleString()
              }
            </small>

          </div>
        `;
      });

    }

    // SHOW POPUP

    box.style.display = "block";

    // MARK AS READ

    await fetch(
      `http://localhost:3000/mark-notifications-read/${employee.id}`,
      {
        method:"PUT"
      }
    );

    // RELOAD COUNT

    loadNotificationCount();

  }

  catch(error){

    console.log(error);

  }

}

// ================= CLOSE POPUP =================

document.addEventListener("click", function(e){

  const box =
    document.getElementById("notificationBox");

  const bell =
    document.querySelector(".emp-da-icon-notification");

  if(
    !box.contains(e.target)
    &&
    !bell.contains(e.target)
  ){

    box.style.display = "none";

  }

});

// ================= INITIAL LOAD =================

loadNotificationCount();

</script>




<!-- Change password - JS  -->
<script>

document.getElementById("changePasswordForm")
  .addEventListener("submit", async function(e) {

  e.preventDefault();

// ================= GET VALUES =================

  const currentPassword = document.getElementById("currentPassword").value;

  const newPassword = document.getElementById("newPassword").value;

  const confirmPassword = document.getElementById("confirmPassword").value;

// ================= GET EMPLOYEE =================

  const employee = JSON.parse(localStorage.getItem("employee"));

  const emp_id = employee.emp_id;

// ================= VALIDATION =================

  if(newPassword !== confirmPassword){

    alert("Passwords do not match");

    return;
  }

  try{

// ================= API CALL =================

    const res = await fetch(
      "http://localhost:3000/employee/change-password",
      {
        method: "PUT",

        headers:{
          "Content-Type":"application/json"
        },

        body: JSON.stringify({
          emp_id,
          currentPassword,
          newPassword
        })
      }
    );

    const data = await res.json();

// ================= SUCCESS / ERROR =================

    if(res.ok){

      alert("✅ Password updated successfully");

      document.getElementById("changePasswordForm").reset();

    }

    else{

      alert(data.message);

    }

  }

  catch(error){

    console.log(error);

    alert("Server Error");

  }

});

</script>

</body>
</html>
