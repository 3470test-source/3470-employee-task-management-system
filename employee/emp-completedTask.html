<!-- Employee Completed Task -->
<div class="emp-completed-container">

      <h2>View Completed Task</h2>

              <tr>
                <th>S.No</th>

                <th>Department</th>

                <th>Assign Date</th>

                <th>Action</th>
              </tr>

      </table>

</div>

<!-- drop down filed JS -->
<script>
  const dropBtn = document.querySelector(".emp-side-bar-drop-btn");
  const dropdown = document.querySelector(".employee-sidebar-task-dropdown");

  dropBtn.addEventListener("click", () => {
    dropdown.classList.toggle("active");
  });
</script>


<!-- profile dropdown field JS -->
<script>
function toggleDropdown() {
  document.getElementById("dropdownMenu").classList.toggle("show");
}

// optional: close when click outside
document.addEventListener("click", function(event) {
  let dropdown = document.querySelector(".admin-profile-dropdown");
  if (!dropdown.contains(event.target)) {
    document.getElementById("dropdownMenu").classList.remove("show");
  }
});
</script>

















<script>
const tasks = [
{
 title:"Change in the XYZ Software",
 department:"Technical",
 assignedTo:"John Doe (1452666)",
 assignDate:"2024-09-20 07:17:21",
 endDate:"2024-09-25",
 status:"Completed"
}
];

function loadCompletedTasks(){

    const tbody =
        document.getElementById("completedBody");

    tbody.innerHTML = "";

    const completedTasks =
        tasks.filter(task =>
            task.status === "Completed"
        );

    if(completedTasks.length === 0){

        tbody.innerHTML = `
        <tr>
          <td colspan="8" class="completedTask-no-record">
             No Record found
          </td>
        </tr>
        `;

        return;
    }

    completedTasks.forEach((task,index)=>{

        tbody.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${task.title}</td>
            <td>${task.department}</td>
            <td>${task.assignedTo}</td>
            <td>${task.assignDate}</td>
            <td>${task.endDate}</td>

            <td>
                <span class="emp-completedTask-badge">
                    ${task.status}
                </span>
            </td>

            <td>
                <button onclick="viewTask(${index})">
                    View
                </button>
            </td>
        </tr>
        `;
    });
}

function viewTask(index){

    const task = tasks[index];

    alert(
`Task Title: ${task.title}
Assigned To: ${task.assignedTo}
Status: ${task.status}`
    );
}

loadCompletedTasks();
</script>

</body>
